<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inazuma Simulator</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS Personalizzati -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/styleSimulator.css?v=2">
</head>
<body class="pb-5">

<div class="inazuma-nav-container">
    <div class="inazuma-nav">
        <a href="index.html" class="inazuma-nav-item">Album</a>
        <a href="coaches.html" class="inazuma-nav-item">Allenatori</a>
        <a href="simulator.html" class="inazuma-nav-item active">Simulatore</a>
    </div>
</div>

<div class="container" style="max-width: 1200px;">
    <h2 class="album-title text-center text-lg-start fw-bold mb-4">Simulatore Potenza Tecnica</h2>

    <div class="row g-4">
        <!-- Colonna Sinistra -->
        <div class="col-lg-6">
            <!-- Usiamo .card per avere l'azzurrino del nuovo tema -->
            <div class="card p-4 shadow mb-4">
                <h5 class="text-info mb-3">Impostazioni Calcolo</h5>

                <label class="form-label small text-secondary fw-bold">PERSONAGGIO</label>
                <select id="sim-char" class="form-select mb-3"></select>

                <label class="form-label small text-secondary fw-bold">LIVELLO GIOCATORE</label>
                <select id="sim-lvl" class="form-select mb-3">
                    <option value="lv1">Livello 1</option>
                    <option value="lv300" selected>Livello 300</option>
                </select>

                <label class="form-label small text-secondary fw-bold">MOLTIPLICATORE RUOLO</label>
                <select id="sim-role" class="form-select mb-3">
                    <option value="1.00">Nessuno (x1.00)</option>
                    <option value="1.05">Ruolo B (x1.05)</option>
                    <option value="1.10">Ruolo A (x1.10)</option>
                    <option value="1.15" selected>Ruolo S (x1.15)</option>
                </select>

                <label class="form-label small text-secondary fw-bold">TECNICA E LIVELLO MOSSA</label>
                <div class="row g-2 mb-3">
                    <div class="col-8">
                        <select id="sim-tech" class="form-select"></select>
                    </div>
                    <div class="col-4">
                        <select id="sim-tech-lvl" class="form-select"></select>
                    </div>
                </div>

                <div class="form-check form-switch mb-3 mt-2">
                    <input class="form-check-input" type="checkbox" id="sim-stab" checked disabled>
                    <label class="form-check-label fw-bold small text-info" id="stab-label">STAB AUTOMATICO</label>
                </div>

                <label class="form-label small text-secondary fw-bold">VANTAGGIO DI TIPO</label>
                <select id="sim-advantage" class="form-select">
                    <option value="1.0" selected>Neutro (x1.00)</option>
                    <option value="1.2">Vantaggio (+20%)</option>
                    <option value="0.8">Svantaggio (-20%)</option>
                </select>
            </div>

            <div class="card p-4 shadow">
                <h5 class="text-info mb-3">Seleziona Livello delle Abilità Passive</h5>
                <div id="dynamic-passives-container"></div>
            </div>
        </div>

        <!-- Colonna Destra -->
        <div class="col-lg-6">
            <div class="card p-4 text-center mb-4 shadow">
                <h4 class="text-secondary h5">Potenza Finale Stimata</h4>
                <div id="damage-result" class="display-1 text-info fw-bold my-2">0</div>
                <div class="p-2 rounded border border-secondary mt-3 bg-white">
                    <small id="damage-formula" class="text-secondary font-monospace" style="font-size: 0.85rem; display: block; white-space: pre-wrap; text-align: left;"></small>
                </div>
            </div>

            <div class="card p-4 shadow">
                <h5 class="text-info border-bottom border-secondary pb-2">Valori Coinvolti</h5>
                <ul id="stats-display" class="list-unstyled mb-0 style-list" style="line-height: 2;"></ul>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="js/simulator.js?v=2"></script>
</body>
</html>
