<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1450">
    <title>Database Statistiche | Inazuma Eleven</title>
    <link rel="icon" type="image/png" href="img/IECross.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/styleTeamBuilder.css">
    <link rel="stylesheet" href="css/styleStats.css">
</head>
<body class="pb-5">

<script type="module" src="js/Components/navbar.js"></script>
<inazuma-navbar></inazuma-navbar>

<div class="container-fixed py-4" style="width: 1200px !important; max-width: 1200px !important;">
    <div class="d-flex justify-content-between align-items-center mb-4 p-3 rounded" style="background: #0b1a42; border: 2px solid #ffca28; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">
        <h3 class="m-0 text-white fw-bold"><i class="fas fa-table text-warning me-2"></i> Database Statistiche</h3>
    </div>

    <!-- PANNELLO FILTRI -->
    <div class="filters-container mb-4 shadow-sm">
        <script type="module" src="js/Components/filters.js"></script>
        <inazuma-filters></inazuma-filters>
    </div>

    <!-- TABELLA -->
    <div class="stats-table">
        <div class="stats-header">
            <div class="col-name" onclick="window.sortStats('name')">Nome <i class="fas fa-sort"></i></div>
            <div class="col-stat" onclick="window.sortStats('Tiro')">Tiro <i class="fas fa-sort"></i></div>
            <div class="col-stat" onclick="window.sortStats('Tecnica')">Tecnica <i class="fas fa-sort"></i></div>
            <div class="col-stat" onclick="window.sortStats('Blocco')">Blocco <i class="fas fa-sort"></i></div>
            <div class="col-stat" onclick="window.sortStats('Parata')">Parata <i class="fas fa-sort"></i></div>
            <div class="col-stat" onclick="window.sortStats('Velocità')">Velocità <i class="fas fa-sort"></i></div>
        </div>
        <div id="stats-list">
            <!-- Righe generate da JS -->
        </div>
    </div>
</div>

<script type="module" src="js/Controllers/stats.js"></script>
</body>
</html>
