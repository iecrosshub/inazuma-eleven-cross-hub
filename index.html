<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inazuma Album</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS Personalizzati -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/styleAlbum.css">
</head>
<body>

<div class="inazuma-nav-container">
  <div class="inazuma-nav">
    <a href="index.html" class="inazuma-nav-item active">Album</a>
    <a href="coaches.html" class="inazuma-nav-item">Allenatori</a>
    <a href="simulator.html" class="inazuma-nav-item">Simulatore</a>
  </div>
</div>

<div class="container py-3">
  <!-- Sostituito text-info con album-title per il colore bianco ombreggiato -->
  <h2 class="album-title text-center mb-5 fw-bold">Seleziona un Personaggio</h2>
  <div class="filter-panel container mb-4 p-3 rounded" style="background-color: #0d55aa; border: 2px solid #2482df;">
    <div class="row g-3 align-items-center">
      <div class="col-12 col-md-3">
        <input type="text" id="search-name" class="form-control" placeholder="Cerca nome..." style="background: #1b75d0; color: white; border: 1px solid #2482df;">
      </div>
      <div class="col-6 col-md-3">
        <select id="filter-element" class="form-select" style="background: #1b75d0; color: white; border: 1px solid #2482df;">
          <option value="All">Elemento: All</option>
          <option value="Fire">Fire</option>
          <option value="Forest">Forest</option>
          <option value="Mountain">Mountain</option>
          <option value="Wind">Wind</option>
        </select>
      </div>
      <div class="col-6 col-md-3">
        <select id="filter-position" class="form-select" style="background: #1b75d0; color: white; border: 1px solid #2482df;">
          <option value="All">Posizione: All</option>
          <option value="GK">GK</option>
          <option value="DF">DF</option>
          <option value="MF">MF</option>
          <option value="FW">FW</option>
        </select>
      </div>
      <div class="col-6 col-md-3">
        <select id="filter-rarity" class="form-select" style="background: #1b75d0; color: white; border: 1px solid #2482df;">
          <option value="All">Rarity: All</option>
          <option value="1">1 Stella</option>
          <option value="2">2 Stelle</option>
          <option value="3">3 Stelle</option>
        </select>
      </div>
    </div>
  </div>
  <div id="character-grid" class="row g-3"></div>
</div>

<script type="module" src="js/gallery.js"></script>
</body>
</html>
