<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1450">
  <title>Inazuma Hub | Inazuma Eleven Cross</title>
  <link rel="icon" type="image/png" href="img/IECross.png">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- LIBRERIA INTRO.JS PER IL TUTORIAL -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intro.js/minified/introjs.min.css">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/styleAlbum.css">
  <link rel="stylesheet" href="css/styleTeamBuilder.css">

  <style>
    /* Personalizzazione del fumetto del tutorial */
    .introjs-tooltip {
      min-width: 400px;
      color: #0b1a42;
      font-family: inherit;
      border: 2px solid #ffca28;
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }
    .introjs-button {
      background-color: #0b1a42;
      color: white;
      text-shadow: none;
      border: 1px solid #ffca28;
      font-weight: bold;
    }
    .introjs-button:hover { background-color: #102247; color: #ffca28; }

    /* BOTTONE GIALLO (Snellito e proporzionato) */
    .btn-tutorial-custom {
      background-color: #ffca28;
      color: #0b1a42 !important;
      border: 3px solid #0b1a42;
      border-radius: 10px;
      font-size: 1.1rem; /* Ridotto rispetto a prima */
      font-weight: 900;
      text-transform: uppercase;
      padding: 10px 25px; /* Meno ingombrante */
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 6px 15px rgba(0,0,0,0.3);
      transition: all 0.3s ease;
    }
    .btn-tutorial-custom i {
      font-size: 1.4rem;
      color: #d32f2f;
    }
    .btn-tutorial-custom:hover {
      background-color: #ffdb58;
      transform: translateY(-2px);
    }

    /* Animazione Battito (Pulse) */
    @keyframes pulse-guide-yellow {
      0% { box-shadow: 0 0 0 0 rgba(255, 202, 40, 0.8); }
      50% { box-shadow: 0 0 0 15px rgba(255, 202, 40, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 202, 40, 0); }
    }
    .btn-tutorial-pulse {
      animation: pulse-guide-yellow 2s infinite;
    }

    /* Regola per far aprire la navbar da sola durante il tutorial */
    .nav-dropdown.force-show .dropdown-content {
      display: block !important;
    }
  </style>
</head>
<body>

<script type="module" src="js/Components/navbar.js"></script>
<inazuma-navbar></inazuma-navbar>

<div class="container-fixed py-3">

  <!-- INTESTAZIONE: TITOLO A SINISTRA E BOTTONE A DESTRA -->
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4 mt-2 px-2">
    <h2 class="album-title m-0 fw-bold" style="text-transform: uppercase; letter-spacing: 1px;">
      Seleziona un Giocatore
    </h2>

    <button id="btn-tutorial" class="btn-tutorial-custom btn-tutorial-pulse mt-3 mt-md-0">
      <i class="fas fa-play-circle"></i> Come funziona IE Cross Hub?
    </button>
  </div>

  <!-- PANNELLO FILTRI -->
  <div class="filters-container mb-4 shadow-sm">
    <script type="module" src="js/Components/filters.js"></script>
    <inazuma-filters></inazuma-filters>
  </div>

  <div id="character-grid" class="row g-3"></div>
</div>

<!-- Script di Intro.js -->
<script src="https://cdn.jsdelivr.net/npm/intro.js/minified/intro.min.js"></script>
<script type="module" src="js/Controllers/gallery.js"></script>
</body>
</html>
