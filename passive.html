<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1450">
    <title>Database Passive | Inazuma Eleven</title>
    <link rel="icon" type="image/png" href="img/IECross.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/styleTeamBuilder.css">
    <link rel="stylesheet" href="css/styleTechniques.css">
    <link rel="stylesheet" href="css/stylePassive.css">
</head>
<body class="pb-5">

<script type="module" src="js/Components/navbar.js"></script>
<inazuma-navbar></inazuma-navbar>

<div class="container-fixed py-4" style="width: 1200px !important; max-width: 1200px !important;">
    <div class="d-flex justify-content-between align-items-center mb-4 p-3 rounded" style="background: #0b1a42; border: 2px solid #ffca28; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">
        <h3 class="m-0 text-white fw-bold"><i class="fas fa-book-open text-warning me-2"></i> Database Passive</h3>
    </div>

    <!-- PANNELLO FILTRI -->
    <div class="filters-container mb-4 shadow-sm">
        <div class="row g-3">
            <div class="col-12 col-md-12">
                <div class="filter-group">
                    <label>Cerca per Nome/Descrizione</label>
                    <input type="text" id="search-name" placeholder="Inserisci il nome o parte della descrizione..." style="width: 100%;">
                </div>
            </div>
            <!-- Filtro Categoria -->
            <div class="col-12 col-md-4">
                <div class="filter-group">
                    <label>Categoria</label>
                    <div class="custom-select" id="filter-category" data-value="All">
                        <div class="select-selected"><span>Tutte le Categorie</span> <i class="fas fa-chevron-down"></i></div>
                        <div class="select-items select-hide">
                            <div data-value="All">Tutte le Categorie</div>
                            <div data-value="Level">Passive di Livello</div>
                            <div data-value="Awakening">Passive di Risveglio</div>
                            <div data-value="Reroll">Passive di Reroll</div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Filtro Statistica -->
            <div class="col-12 col-md-4">
                <div class="filter-group">
                    <label>Statistica Modificata</label>
                    <div class="custom-select" id="filter-stat" data-value="All">
                        <div class="select-selected"><span>Tutte le Statistiche</span> <i class="fas fa-chevron-down"></i></div>
                        <div class="select-items select-hide">
                            <div data-value="All">Tutte le Statistiche</div>
                            <div data-value="Tiro">Tiro</div>
                            <div data-value="Tecnica">Tecnica</div>
                            <div data-value="Blocco">Blocco</div>
                            <div data-value="Parata">Parata</div>
                            <div data-value="Velocità">Velocità</div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Filtro Potenza Tecnica -->
            <div class="col-12 col-md-4">
                <div class="filter-group">
                    <label>Potenza Tecnica (Buff)</label>
                    <div class="custom-select" id="filter-power" data-value="All">
                        <div class="select-selected"><span>Tutta Potenza</span> <i class="fas fa-chevron-down"></i></div>
                        <div class="select-items select-hide">
                            <div data-value="All">Tutta Potenza</div>
                            <div data-value="Tiro">Potenza Tiro</div>
                            <div data-value="Dribbling">Potenza Dribbling</div>
                            <div data-value="Blocco">Potenza Blocco</div>
                            <div data-value="Parata">Potenza Parata</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Lista -->
    <div id="passive-list" class="d-flex flex-column gap-3"></div>
</div>

<script type="module" src="js/Controllers/passiveDB.js"></script>
</body>
</html>
