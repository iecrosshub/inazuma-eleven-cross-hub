<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1450">
    <title>La Mia Collezione | Inazuma Eleven</title>
    <link rel="icon" type="image/png" href="img/IECross.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/styleTeamBuilder.css">
    <link rel="stylesheet" href="css/styleCollection.css">

    <style>
        .manual-equip .select-items div {
            color: #f8f9fa !important;
            border-bottom: 1px solid #444 !important;
        }
        .manual-equip .select-items div:hover {
            background-color: #343a40 !important;
            color: #ffca28 !important;
        }
    </style>
</head>
<body class="pb-5">

<script type="module" src="js/navbar.js"></script>
<inazuma-navbar></inazuma-navbar>

<div class="container-fixed py-3">
    <!-- Barra Utente / Salvataggio -->
    <div class="d-flex justify-content-between align-items-center mb-4 p-3 rounded" style="background: #0b1a42; border: 2px solid #ffca28; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">
        <div>
            <h4 class="m-0 text-white fw-bold" id="user-greeting">Accedi per salvare la tua collezione</h4>
        </div>
        <div>
            <button id="btn-login" class="btn btn-light px-4 fw-bold text-dark"><i class="fab fa-google me-2 text-danger"></i> Accedi con Google</button>
            <button id="btn-logout" class="btn btn-outline-light px-4 fw-bold" style="display: none;">Esci</button>
            <button id="btn-save-cloud" class="btn btn-warning px-4 ms-2 fw-bold" style="display: none;"><i class="fas fa-cloud-upload-alt me-2"></i> Salva nel Cloud</button>
        </div>
    </div>

    <!-- IMPOSTAZIONI GLOBALI RAPIDE -->
    <div class="global-settings-bar mb-4 p-3 rounded shadow-sm border border-info" style="background: #0b1a42;">
        <h5 class="text-info mb-3 fw-bold"><i class="fas fa-globe"></i> Impostazioni Globali Rapide</h5>
        <div class="row g-3 align-items-end">
            <div class="col-12 col-md-8">
                <label class="form-label text-light small fw-bold">Imposta Livello a TUTTE le passive legate al Livello</label>
                <div class="d-flex gap-2">
                    <input type="number" id="global-level-input" class="form-control form-control-sm border-info" min="1" max="50" style="max-width: 150px;">
                    <button id="btn-apply-level" class="btn btn-info btn-sm fw-bold px-4">Applica Livello</button>
                </div>
            </div>
        </div>
    </div>

    <!-- FILTRI UNIFICATI IN UN SOLO BLOCCO BIANCO -->
    <div class="filters-container mb-4 shadow-sm">
        <!-- Filtro specifico Collezione -->
        <div class="row g-3 mb-3">
            <div class="col-12 col-md-4">
                <div class="filter-group mb-0">
                    <label>Stato Possesso</label>
                    <div class="custom-select" id="filter-owned" data-value="All">
                        <div class="select-selected"><span>Tutti i Giocatori</span> <i class="fas fa-chevron-down"></i></div>
                        <div class="select-items select-hide">
                            <div data-value="All">Tutti i Giocatori</div>
                            <div data-value="owned">Solo Posseduti</div>
                            <div data-value="not-owned">Non Posseduti</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- FILTRI GLOBALI -->
        <script type="module" src="js/filters.js"></script>
        <inazuma-filters></inazuma-filters>
    </div>

    <!-- Griglia Collezione -->
    <div class="row" id="collection-grid">
        <div class="col-12 text-center my-5">
            <div class="spinner-border text-light" role="status"></div>
            <p class="mt-2 text-white fw-bold">Caricamento database giocatori...</p>
        </div>
    </div>
</div>

<!-- MODALE AVVISO SALVATAGGIO -->
<div id="unsaved-modal" class="global-modal-overlay">
    <div class="global-modal-content">
        <div class="global-modal-header"><i class="fas fa-exclamation-triangle"></i> Attenzione!</div>
        <p class="fw-bold text-secondary">Hai effettuato delle modifiche alla tua collezione senza salvare. Vuoi salvarle prima di cambiare pagina?</p>
        <div class="global-modal-actions">
            <button id="btn-modal-save" class="btn btn-success fw-bold"><i class="fas fa-save"></i> Sì, Salva</button>
            <button id="btn-modal-discard" class="btn btn-danger fw-bold"><i class="fas fa-trash"></i> No, Esci</button>
            <button id="btn-modal-cancel" class="btn btn-secondary fw-bold">Annulla</button>
        </div>
    </div>
</div>

<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDJLzxu2tREehzZE79YAK7_TIq1G6lf4Rc",
        authDomain: "inazumaelevencrosshub.firebaseapp.com",
        projectId: "inazumaelevencrosshub",
        storageBucket: "inazumaelevencrosshub.firebasestorage.app",
        messagingSenderId: "100160386925",
        appId: "1:100160386925:web:2f35aaacb877d70c9f4c64",
        measurementId: "G-0R453LFDB0"
    };

    const app = initializeApp(firebaseConfig);
    window.firebaseAuth = getAuth(app);
    window.googleProvider = new GoogleAuthProvider();
    window.firebaseDb = getFirestore(app);
    window.firebaseLogin = signInWithPopup;
    window.firebaseLogout = signOut;
    window.firebaseOnAuth = onAuthStateChanged;
    window.dbDoc = doc;
    window.dbSet = setDoc;
    window.dbGet = getDoc;
</script>

<script type="module" src="js/collection.js"></script>

</body>
</html>
