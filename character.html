<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="google-adsense-account" content="ca-pub-3582001665371701">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dettaglio Personaggio</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS Personalizzati -->
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/styleCharacter.css">
</head>
<body class="pt-3">

<!-- NAVIGAZIONE PRINCIPALE (A Pillola + Precedente/Successivo) -->
<div class="container my-4 position-relative" style="max-width: 1400px;">

    <!-- Tasti laterali -->
    <button type="button" id="btn-prev-char" class="btn btn-outline-info fw-bold rounded-pill px-4 position-absolute top-50 start-0 translate-middle-y">
        ◀ Precedente
    </button>
    <button type="button" id="btn-next-char" class="btn btn-outline-info fw-bold rounded-pill px-4 position-absolute top-50 end-0 translate-middle-y">
        Successivo ▶
    </button>

    <!-- Navigazione Centrale a Pillola -->
    <div class="inazuma-nav-container">
        <nav class="inazuma-nav">
            <a href="./index.html" class="inazuma-nav-item">Personaggi</a>
            <a href="#" class="inazuma-nav-item active">Dettagli</a>
            <a id="btn-send-to-sim" href="./simulator.html" class="inazuma-nav-item">Simulatore</a>
            <a href="./coaches.html" class="inazuma-nav-item">Allenatori</a>
        </nav>
    </div>

</div>

<div class="container pb-5" style="max-width: 1400px;">
    <div class="row g-4">
        <!-- Colonna Sinistra (Immagine e Statistiche) -->
        <div class="col-lg-4 col-xl-3 text-center">
            <div class="bg-dark p-3 rounded-3 border border-secondary shadow mb-4">
                <img id="char-img" src="" alt="Personaggio" class="img-fluid rounded mb-3">
                <h2 id="char-name-main" class="h4 text-info mb-1">Caricamento...</h2>
                <h4 id="char-name-jp" class="text-secondary" style="font-size: 1.1rem; opacity: 0.9;"></h4>
                <div class="d-flex justify-content-center gap-4 mb-3">
                    <img id="element-icon" src="" style="height: 45px;">
                    <img id="position-icon" src="" style="height: 45px;">
                </div>
                <div id="tags-container" class="d-flex justify-content-center gap-2 flex-wrap border-top border-secondary pt-3"></div>
            </div>

            <div class="bg-dark p-3 rounded-3 border border-secondary shadow text-start">
                <div class="d-flex justify-content-between align-items-center border-bottom border-secondary pb-2 mb-3">
                    <span class="text-info fw-bold fs-5">Statistiche</span>
                    <div class="btn-group btn-group-sm">
                        <button id="btn-lv1" class="btn btn-outline-info active">Lv. 1</button>
                        <button id="btn-lv300" class="btn btn-outline-info">Lv. 300</button>
                    </div>
                </div>
                <ul id="stats-list" class="list-unstyled"></ul>
                <div id="zones-container"></div>
            </div>
        </div>

        <!-- Colonna Destra (Tecniche e Passive) -->
        <div class="col-lg-8 col-xl-9">
            <h3 class="mb-4 text-info">Tecniche</h3>
            <div id="tecniche-container"></div>

            <div id="passive-container"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Aggiungiamo un ?v=2 per costringere il browser a ricaricare il JS aggiornato -->
<script type="module" src="./js/main.js?v=2"></script>

</body>
</html>
