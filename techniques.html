<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1450">
    <title>Database Tecniche | Inazuma Eleven</title>
    <link rel="icon" type="image/png" href="img/IECross.png">

    <!-- Bootstrap & FontAwesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS Personalizzati -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/styleTeamBuilder.css">
    <link rel="stylesheet" href="css/styleTechniques.css">
</head>
<body class="pb-5">

<!-- NAVBAR -->
<!-- NAVBAR INIETTATA DINAMICAMENTE -->
<script type="module" src="js/Components/navbar.js"></script>
<inazuma-navbar></inazuma-navbar>

<div class="container-fixed py-4" style="width: 1200px !important; max-width: 1200px !important;">

    <div class="d-flex justify-content-between align-items-center mb-4 p-3 rounded" style="background: #0b1a42; border: 2px solid #ffca28; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">
        <h3 class="m-0 text-white fw-bold"><i class="fas fa-fire text-warning me-2"></i> Database Tecniche</h3>
    </div>

    <!-- PANNELLO FILTRI -->
    <div class="filters-container mb-4 shadow-sm">
        <div class="row g-3">
            <div class="col-12 col-md-12">
                <div class="filter-group">
                    <label>Cerca per Nome</label>
                    <input type="text" id="search-name" placeholder="Inserisci il nome della tecnica..." style="width: 100%;">
                </div>
            </div>
            <div class="col-12 col-md-3">
                <div class="filter-group">
                    <label>Tipo Mossa</label>
                    <div class="custom-select" id="filter-kind" data-value="All">
                        <div class="select-selected"><span>Tutti i Tipi</span> <i class="fas fa-chevron-down"></i></div>
                        <div class="select-items select-hide">
                            <div data-value="All">Tutti i Tipi</div>
                            <div data-value="Tiro"><img src="img/MoveSkill/Icon_MoveSkill_Shoot.png" alt=""> Tiro</div>
                            <div data-value="Dribbling"><img src="img/MoveSkill/Icon_MoveSkill_Dribble.png" alt=""> Dribbling</div>
                            <div data-value="Blocco"><img src="img/MoveSkill/Icon_MoveSkill_Block.png" alt=""> Blocco</div>
                            <div data-value="Parata"><img src="img/MoveSkill/Icon_MoveSkill_Catch.png" alt=""> Parata</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-3">
                <div class="filter-group">
                    <label>Elemento</label>
                    <div class="custom-select" id="filter-element" data-value="All">
                        <div class="select-selected"><span>Tutti gli Elementi</span> <i class="fas fa-chevron-down"></i></div>
                        <div class="select-items select-hide">
                            <div data-value="All">Tutti gli Elementi</div>
                            <div data-value="Fuoco"><img src="img/Element/Icon_Element_Fire.png" alt=""> Fuoco</div>
                            <div data-value="Vento"><img src="img/Element/Icon_Element_Wind.png" alt=""> Vento</div>
                            <div data-value="Foresta"><img src="img/Element/Icon_Element_Forest.png" alt=""> Foresta</div>
                            <div data-value="Montagna"><img src="img/Element/Icon_Element_Mountain.png" alt=""> Montagna</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-3">
                <div class="filter-group">
                    <label>Filtro Blocco Tiri</label>
                    <div class="custom-select" id="filter-sb" data-value="All">
                        <div class="select-selected"><span>Tutte le Mosse</span> <i class="fas fa-chevron-down"></i></div>
                        <div class="select-items select-hide">
                            <div data-value="All">Tutte le Mosse</div>
                            <div data-value="yes"><span class="badge bg-danger">SB</span> Solo Blocco Tiri</div>
                            <div data-value="no">Senza Blocco Tiri</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-3">
                <div class="filter-group">
                    <label>Stile Parata</label>
                    <div class="custom-select" id="filter-catch" data-value="All">
                        <div class="select-selected"><span>Tutte le Mosse</span> <i class="fas fa-chevron-down"></i></div>
                        <div class="select-items select-hide">
                            <div data-value="All">Tutte le Mosse</div>
                            <div data-value="Blocco">Solo Blocco</div>
                            <div data-value="Respinta">Solo Respinta</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Lista delle Tecniche -->
    <div id="techniques-list" class="d-flex flex-column gap-4">
        <!-- Vengono generate dinamicamente qui -->
    </div>

</div>

<script type="module" src="js/Controllers/techniques.js"></script>
</body>
</html>
