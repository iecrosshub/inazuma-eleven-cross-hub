<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1450">
    <title>Team Builder | Inazuma Eleven Cross</title>
    <link rel="icon" type="image/png" href="img/IECross.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/styleTeamBuilder.css">
</head>
<body class="teambuilder-page">

<script type="module" src="js/navbar.js"></script>
<inazuma-navbar></inazuma-navbar>

<main class="app-container">
    <div class="tb-workspace">

        <!-- COLONNA SINISTRA: ALLENATORI -->
        <aside class="sidebar sidebar-left">
            <div class="sidebar-header">
                <h2>Formazione:</h2>
            </div>
            <div id="coach-list" class="coach-grid"></div>
        </aside>

        <!-- COLONNA CENTRALE: CAMPO GIGANTE -->
        <article class="main-detail">
            <div class="detail-header">
                <img id="coach-portrait" src="" alt="Coach" class="coach-portrait" style="display:none;">
                <div class="detail-title">
                    <div class="label">TEAM BUILDER</div>
                    <h2 id="coach-name">Seleziona Allenatore</h2>
                    <select id="coach-level-select" class="level-select" style="display:none;"></select>
                </div>
            </div>

            <div class="info-card">
                <div id="team-name-header" class="header-text-window" style="display:none;"></div>

                <div class="pitch-container-wrapper">
                    <div id="pitch-container" class="pitch"></div>
                </div>
            </div>

            <div class="pitch-actions">
                <button id="btn-remove-player" class="tb-btn-remove" style="display: none;">
                    <i class="fas fa-trash"></i> Rimuovi dal campo
                </button>
            </div>
        </article>

        <!-- COLONNA DESTRA: FILTRI, CONDIZIONI E GIOCATORI -->
        <aside class="sidebar sidebar-right">
            <div class="sidebar-header">
                <h2>Giocatori:</h2>
            </div>

            <!-- PANNELLO FILTRI BIANCO -->
            <div class="filters-container shadow-sm mb-3">
                <script type="module" src="js/filters.js"></script>
                <inazuma-filters></inazuma-filters>
            </div>

            <button id="btn-reset-filters" class="tb-btn-reset">Resetta Filtri</button>

            <!-- BOX CONDIZIONI -->
            <div id="tb-conditions-box" class="tb-conditions" style="display:none; margin-bottom: 12px; width: 100%; margin-top: 20px;">
                <div class="conditions-title">Condizioni Allenatore</div>
                <div id="tb-conditions-list" class="tb-conditions-list-horizontal"></div>
            </div>

            <div id="player-grid-container" class="tb-player-grid"></div>
        </aside>

    </div>
</main>

<script type="module" src="js/teamBuilder.js"></script>
</body>
</html>
